app = 'simple-calculator-cold-leaf-5386'
primary_region = 'arn'

[build]

[env]
PORT = "5001"

[processes]
app = "node app.js"

[deploy]
strategy = "canary"

[http_service]
internal_port = 5001
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '1gb'
